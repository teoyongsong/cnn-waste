<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waste Class Predictor</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --border: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: color-mix(in srgb, var(--card) 92%, black);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.4rem;
    }
    .muted {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 0.95rem;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    input[type="file"] {
      color: var(--muted);
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
      background: var(--accent);
      color: #052e16;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .secondary-btn {
      background: #1e293b;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .secondary-btn:hover:not(:disabled) {
      background: #334155;
    }
    .preview-wrap {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 200px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .preview-frame {
      width: 200px;
      max-width: 100%;
      height: 200px;
      max-height: min(200px, 40vh);
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1220;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-frame img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      vertical-align: middle;
    }
    .result {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      min-height: 180px;
      background: #0b1220;
      overflow: auto;
    }
    .label {
      font-size: 1rem;
      margin: 0 0 6px;
    }
    .conf {
      color: #86efac;
      margin: 0 0 14px;
    }
    .topk-item {
      font-size: 0.92rem;
      color: #cbd5e1;
      margin: 3px 0;
    }
    .error {
      color: #fca5a5;
      white-space: pre-wrap;
    }
    .drop-zone {
      margin-bottom: 14px;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      background: #0b1220;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone:hover {
      border-color: #334155;
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(34, 197, 94, 0.08);
    }
    .drop-zone strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }
    .drop-hint {
      font-size: 0.88rem;
      color: var(--muted);
      margin: 0;
    }
    @media (max-width: 560px) {
      .preview-wrap {
        grid-template-columns: 1fr;
      }
      .preview-frame {
        width: min(200px, 100%);
        margin-inline: auto;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Waste Class Predictor</h1>
    <p class="muted">Drag and drop a photo here, choose a file, then click Predict.</p>

    <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Drop image here">
      <strong>Drop image here</strong>
      <p class="drop-hint">or click this area to browse</p>
    </div>
    <input id="fileInput" type="file" accept="image/*" hidden />

    <div class="row">
      <button type="button" id="browseBtn" class="secondary-btn">Choose file…</button>
      <button id="predictBtn">Predict</button>
    </div>

    <div class="preview-wrap">
      <div class="preview-frame">
        <img id="preview" alt="Image preview" />
      </div>
      <div id="result" class="result">Select an image, then click Predict.</div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const browseBtn = document.getElementById("browseBtn");
    const preview = document.getElementById("preview");
    const predictBtn = document.getElementById("predictBtn");
    const result = document.getElementById("result");

    let selectedFile = null;
    let previewObjectUrl = null;

    function isImageFile(file) {
      return file && file.type.startsWith("image/");
    }

    function setSelectedFile(file) {
      if (!file) {
        selectedFile = null;
        return;
      }
      if (!isImageFile(file)) {
        result.innerHTML = '<p class="error">Please use an image file (PNG, JPEG, WebP, etc.).</p>';
        return;
      }
      selectedFile = file;
      if (previewObjectUrl) URL.revokeObjectURL(previewObjectUrl);
      previewObjectUrl = URL.createObjectURL(file);
      preview.src = previewObjectUrl;
      result.textContent = "Ready to predict.";
      fileInput.value = "";
    }

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (file) setSelectedFile(file);
    });

    browseBtn.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        fileInput.click();
      }
    });

    dropZone.addEventListener("dragenter", (e) => {
      e.preventDefault();
      dropZone.classList.add("drag-over");
    });
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
      dropZone.classList.add("drag-over");
    });
    dropZone.addEventListener("dragleave", (e) => {
      if (e.relatedTarget && dropZone.contains(e.relatedTarget)) return;
      dropZone.classList.remove("drag-over");
    });
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      const file = e.dataTransfer.files?.[0];
      if (file) setSelectedFile(file);
    });

    predictBtn.addEventListener("click", async () => {
      if (!selectedFile) {
        result.innerHTML = '<p class="error">Please choose an image first.</p>';
        return;
      }

      predictBtn.disabled = true;
      result.textContent = "Predicting...";

      try {
        const formData = new FormData();
        formData.append("file", selectedFile);

        const response = await fetch("http://127.0.0.1:8000/predict", {
          method: "POST",
          body: formData,
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Prediction request failed.");
        }

        const topkHtml = (data.top_k || [])
          .map(
            (item, idx) =>
              `<div class="topk-item">${idx + 1}. ${item.class_name} - ${(item.confidence * 100).toFixed(2)}%</div>`
          )
          .join("");

        result.innerHTML = `
          <p class="label"><strong>Prediction:</strong> ${data.predicted_class}</p>
          <p class="conf"><strong>Confidence:</strong> ${(data.confidence * 100).toFixed(2)}%</p>
          <div>${topkHtml || ""}</div>
        `;
      } catch (err) {
        result.innerHTML = `<p class="error">${err.message}</p>`;
      } finally {
        predictBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
